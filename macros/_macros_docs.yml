macros:
  - name: cents_to_dollars
    description: |
      Converts a column in cents to dollars by dividing by 100 and rounding to the specified number of decimal places.
    arguments:
      - name: column_name
        description: The name of the column to convert from cents to dollars.
        type: string
      - name: decimals
        description: The number of decimal places to round the result to. Default is 2.
        type: integer

  - name: grant_select
    description: |
      Grants SELECT privileges to SELECT statement against views/tables on a specified database to a specified role.
    arguments:
      - name: schema
        description: The name of the schema to grant SELECT privileges on.
        type: string
      - name: role
        description: The name of the role to grant SELECT privileges to.
        type: string  
      - name: database
        description: The name of the database to grant SELECT privileges on.
        type: string