models:
  - name: stg_jaffle_shop__customers
    description: "This model is a staging model for the customers table in the jaffle_shop source. One customer per row"
    columns:
      - name: customer_id
        description: "The unique identifier for each customer."
        data_tests:
          - not_null
          - unique
      - name: first_name
        description: "The first name of the customer."
      - name: last_name
        description: "The last name of the customer."


  - name: stg_jaffle_shop__orders
    description: "This model is a staging model for the orders table in the jaffle_shop source."
    columns:
      - name: order_id
        description: "The unique identifier for each order."
        data_tests:
          - not_null
          - unique
      - name: customer_id
        description: "The unique identifier for the customer who placed the order. Foreign key to the customers table."
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop__customers')
                field: customer_id
      - name: order_date
        description: "The date when the order was placed."
      - name: order_status  
        description: '{{ doc("order_status") }}'
        data_tests:
          - accepted_values:
              arguments:
                values: ['placed', 'shipped', 'completed', 'returned', 'return_pending']
      - name: _etl_loaded_at
        description: "The timestamp when the order data was loaded into the staging model."   